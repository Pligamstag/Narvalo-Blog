<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon compte — Les Narvalos</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="grain"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="index.html">
          <div class="logo-icon">🌀</div>
          <span class="logo-text">Les Narvalos</span>
          <span class="logo-badge">BLOG</span>
        </a>
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">Accueil</a>
        <a href="auteurs.html" class="nav-link nav-authors">👥 L'équipe</a>
      </nav>
      <div class="header-user">
        <div class="user-chip" id="user-chip">
          <img class="user-chip-avatar" id="user-chip-avatar" src="" alt="" style="display:none" />
          <span class="user-chip-name" id="user-chip-name">—</span>
          <button class="user-chip-logout" id="btn-signout">✕</button>
        </div>
      </div>
      <button class="nav-toggle"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main style="max-width:560px;margin:60px auto;padding:0 20px">
    <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:800;margin-bottom:8px">Mon compte</h1>
    <p style="color:var(--text2);margin-bottom:32px">Modifie ton nom et ta photo de profil.</p>

    <div id="not-logged" class="hidden" style="text-align:center;padding:60px 0;color:var(--text3)">
      <p>Tu dois être connecté pour accéder à cette page.</p>
      <a href="index.html" style="color:var(--accent)">← Retour à l'accueil</a>
    </div>

    <div id="account-form">
      <div id="account-error" style="display:none;background:rgba(255,107,157,.08);border:1px solid rgba(255,107,157,.2);color:var(--neon-pink);padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.85rem"></div>
      <div id="account-success" style="display:none;background:rgba(86,240,159,.08);border:1px solid rgba(86,240,159,.2);color:var(--neon-green);padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.85rem"></div>

      <!-- Avatar preview -->
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px">
        <div id="avatar-preview" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--neon-purple),var(--neon-blue));display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0">?</div>
        <div>
          <p style="font-weight:600;color:var(--text);margin-bottom:4px" id="preview-name-text">Ton nom</p>
          <p style="font-size:.8rem;color:var(--text3)" id="preview-email-text"></p>
        </div>
      </div>

      <!-- Nom -->
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Nom affiché</label>
        <input type="text" id="account-name" placeholder="Ton prénom ou pseudo"
          style="width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.95rem;outline:none" />
      </div>

      <!-- Photo -->
      <div style="margin-bottom:24px">
        <label style="display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Photo de profil (URL)</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="account-avatar" placeholder="https://..."
            style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.9rem;outline:none" />
          <label style="display:inline-flex;align-items:center;gap:6px;background:var(--surface2);color:var(--text2);font-size:.78rem;font-weight:600;padding:10px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer">
            📁
            <input type="file" id="account-avatar-file" accept="image/*" style="display:none" />
          </label>
        </div>
      </div>

      <button id="btn-save-account" style="background:linear-gradient(135deg,var(--neon-purple),#7c3aed);color:#fff;font-weight:700;font-size:.82rem;letter-spacing:.04em;padding:12px 28px;border-radius:999px;border:none;cursor:pointer;margin-bottom:32px">
        💾 Sauvegarder
      </button>

      <!-- Changer mot de passe -->
      <div style="border-top:1px solid var(--border);padding-top:28px">
        <h3 style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;margin-bottom:16px">🔒 Changer le mot de passe</h3>
        <div id="password-error" style="display:none;background:rgba(255,107,157,.08);border:1px solid rgba(255,107,157,.2);color:var(--neon-pink);padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:.84rem"></div>
        <div id="password-success" style="display:none;background:rgba(86,240,159,.08);border:1px solid rgba(86,240,159,.2);color:var(--neon-green);padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:.84rem">✅ Mot de passe changé !</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div>
            <label style="display:block;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Actuel</label>
            <input type="password" id="current-password" placeholder="••••••••"
              style="width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.9rem;outline:none" />
          </div>
          <div>
            <label style="display:block;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Nouveau</label>
            <input type="password" id="new-password" placeholder="••••••••"
              style="width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.9rem;outline:none" />
          </div>
        </div>
        <button id="btn-change-password" style="background:transparent;color:var(--text2);font-size:.78rem;font-weight:600;padding:10px 20px;border-radius:999px;border:1px solid var(--border2);cursor:pointer">
          Changer le mot de passe
        </button>
      </div>
    </div>
  </main>

  <script type="module" src="js/firebase.js"></script>
  <script defer>
    let currentUser = null;

    const tryInit = () => {
      if (!window.onUserAuthChange) { setTimeout(tryInit, 100); return; }
      window.onUserAuthChange(user => {
        currentUser = user;
        if (!user) {
          document.getElementById('not-logged').classList.remove('hidden');
          document.getElementById('account-form').style.display = 'none';
          return;
        }
        // Header
        document.getElementById('user-chip-name').textContent = user.name?.split(' ')[0] || 'Toi';
        const av = document.getElementById('user-chip-avatar');
        if (user.avatar) { av.src = user.avatar; av.style.display = 'block'; }

        // Remplir le formulaire
        document.getElementById('account-name').value   = user.name || '';
        document.getElementById('account-avatar').value = user.avatar || '';
        document.getElementById('preview-name-text').textContent  = user.name || '—';
        document.getElementById('preview-email-text').textContent = user.email || '';
        updateAvatarPreview(user.avatar, user.name);
      });
    };
    tryInit();

    function updateAvatarPreview(avatar, name) {
      const el = document.getElementById('avatar-preview');
      if (avatar) {
        el.innerHTML = `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.parentElement.textContent='${(name||'?').charAt(0).toUpperCase()}'" />`;
      } else {
        el.textContent = (name || '?').charAt(0).toUpperCase();
      }
    }

    // Live preview
    document.getElementById('account-name').addEventListener('input', e => {
      document.getElementById('preview-name-text').textContent = e.target.value || '—';
      updateAvatarPreview(document.getElementById('account-avatar').value, e.target.value);
    });
    document.getElementById('account-avatar').addEventListener('input', e => {
      updateAvatarPreview(e.target.value, document.getElementById('account-name').value);
    });

    // Upload fichier
    document.getElementById('account-avatar-file').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        document.getElementById('account-avatar').value = reader.result;
        updateAvatarPreview(reader.result, document.getElementById('account-name').value);
      };
      reader.readAsDataURL(file);
    });

    // Sauvegarder
    document.getElementById('btn-save-account').addEventListener('click', async () => {
      const name   = document.getElementById('account-name').value.trim();
      const avatar = document.getElementById('account-avatar').value.trim();
      const errEl  = document.getElementById('account-error');
      const sucEl  = document.getElementById('account-success');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      const result = await window.updateUserProfile?.(name, avatar);
      if (result?.success) {
        sucEl.textContent = '✅ Profil mis à jour !';
        sucEl.style.display = 'block';
        setTimeout(() => sucEl.style.display = 'none', 3000);
      } else {
        errEl.textContent = result?.message || 'Erreur.';
        errEl.style.display = 'block';
      }
    });

    // Changer mot de passe
    document.getElementById('btn-change-password').addEventListener('click', async () => {
      const current = document.getElementById('current-password').value;
      const newPass = document.getElementById('new-password').value;
      const errEl   = document.getElementById('password-error');
      const sucEl   = document.getElementById('password-success');
      errEl.style.display = 'none'; sucEl.style.display = 'none';

      if (!current || !newPass) { errEl.textContent = 'Remplis les deux champs.'; errEl.style.display = 'block'; return; }
      if (newPass.length < 6)   { errEl.textContent = '6 caractères minimum.'; errEl.style.display = 'block'; return; }

      const result = await window.changePassword?.(current, newPass);
      if (result?.success) {
        sucEl.style.display = 'block';
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
      } else {
        errEl.textContent = result?.message || 'Erreur.';
        errEl.style.display = 'block';
      }
    });

    // Déconnexion
    document.getElementById('btn-signout').addEventListener('click', async () => {
      await window.signOutGoogle?.();
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
